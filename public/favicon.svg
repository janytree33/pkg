<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="leaf" x1="8" y1="6" x2="56" y2="52" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="50%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="trunk" x1="28" y1="42" x2="36" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 배경 원형 -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- 반짝이 효과 -->
  <circle cx="48" cy="10" r="1.5" fill="#34d399" opacity="0.6"/>
  <circle cx="54" cy="20" r="1" fill="#06b6d4" opacity="0.5"/>
  <circle cx="14" cy="16" r="1" fill="#34d399" opacity="0.4"/>

  <!-- 나뭇잎/나무 (삼각형 3단) -->
  <g filter="url(#glow)">
    <!-- 상단 잎 -->
    <polygon points="32,6 42,24 22,24" fill="url(#leaf)" opacity="0.95"/>
    <!-- 중단 잎 -->
    <polygon points="32,14 46,34 18,34" fill="url(#leaf)" opacity="0.9"/>
    <!-- 하단 잎 -->
    <polygon points="32,22 50,44 14,44" fill="url(#leaf)" opacity="0.85"/>
  </g>

  <!-- 나무 기둥 -->
  <rect x="28" y="43" width="8" height="14" rx="2" fill="url(#trunk)"/>

  <!-- 반짝이 별 (잎 위) -->
  <circle cx="32" cy="6" r="2" fill="white" opacity="0.9"/>
  <line x1="32" y1="3" x2="32" y2="1" stroke="white" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
  <line x1="35" y1="4.7" x2="37" y2="3" stroke="white" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
  <line x1="29" y1="4.7" x2="27" y2="3" stroke="white" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
</svg>